# typos の設定
# 参照: https://github.com/crate-ci/typos

[default]
extend-ignore-identifiers-re = [
  # GPG / SSH key のデータ - 単語に見えるランダム文字列
  "[A-Za-z0-9+/]{20,}",
]

[files]
extend-exclude = [
  # バイナリ / 鍵ファイル
  "*.pub",
  "*.asc",
  "*.age",
  "public-keys/*",
  "secrets/*",
  # 表示上の override ファイル（binary plist data）
  "homes/saqula/platform/Library/Displays/*",
  # ローカル macOS defaults dump
  "defaults.plist",
  # lock ファイル
  "flake.lock",
  "*.lock",
  "*-lock.json",
  # 意図的に特殊な綴りを含む可能性がある config ファイル
  "modules/home/develop/helix/*",
  "modules/home/develop/neovim/*",
  # typos に見える変数名を含む minified JS
  "homes/saqula/platform/spicetify/*",
]

[default.extend-words]
# ブランド名と技術用語
Hashi = "Hashi"         # HashiCorp
noice = "noice"         # noice.nvim plugin name
charcters = "charcters" # Intentional in helix config (upstream spelling)
ba = "ba"               # yt-dlp format selector (best audio)
